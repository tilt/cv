  - id: zweitag
    period: 6/2010 - 10/2013
    company: Zweitag GmbH
    company_details: Ruby on Rails Consultancy
    title: Software Developer
    description: |
      <p>As a <em>software engineer</em> I worked on a variety of projects, for example <em>so-schmeckts.de</em> or <em>compeon.de</em>. Technologies we worked with involved <em>Rails</em> as server-side technology as well as <em>JavaScript</em> and related frameworks like <em>AngularJS</em> on the client-side. Zweitag applies <em>behaviour driven development</em> using <em>Rspec</em>, <em>Capybara</em> and <em>Jasmine</em>. Data visualization were done with <em>D3.js</em> among others.</p>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li><em>Backend and client-side development</em></li>
        <li><em>Technical concepts</em></li>
        <li><em>Customer communication</em></li>
        <li><em>Project coordination</em></li>
      </ul>
    variants: [full]

  - id: ims-research-assistant
    period: 8/2010 - 10/2011
    company: Institute of Mathematical Statistics
    company_details: of the University of Münster
    title: Research assistant
    description: |
      <p>As a <em>research assistant</em> at the institute for probability theory at the University of Münster I was mentor for seminars in <em>probability theory</em> and <em>statistical modelling</em>. Besides I lead the internship for <em>applied statistics with R</em>. I did research in the field of renewal theory exploring structural inheritance properties of Markov renewal processes. Meanwhile I worked as a <em>software developer</em> at Zweitag GmbH (see above).</p>
    variants: [full]

  - id: fairix
    period: 10/2008 - 3/2010
    company: Fairix
    company_details: Startup
    title: Software developer, CTO
    description: |
      <p>Fairix is a startup I took part in as a <em>software engineer</em> while I was a student of mathematics. Fairix provided a platform to producers and merchants enabling them to offer products with additional ecological or social value, e.g. fair trade products. In an <em>engineering team of two</em> we developed a <em>marketplace platform</em> with <em>Ruby on Rails</em>. For that purpose I learnt Rails from scratch and I was <em>leading the development</em> in the later course of the project when the platform launched. The startup finally ran out of funds after two years.</p>
    variants: [full]

  - id: bsi
    period: 8/2007 - 9/2007
    company: "Bundesamt für Sicherheit in der Informationstechnik"
    company_details: (BSI)
    title: Research engineer (Pattern recognition)
    description: |
      <p>At my internship at the BSI I worked on research topics about <em>malware classification</em>. The internship lasted two months and together with my mentor I implemented a <em>pattern recognition</em> and a <em>clustering</em> approach to identify and distinguish malware by the kinds of exploits it used. The software had to be extremely performant and of linear complexity and was written in <em>C</em>.</p>
    variants: [full]

