      <p>As a software engineer I worked on a variety of projects, for example <em>so-schmeckts.de</em> or <em>compeon.de</em>. Technologies we worked with involved <em>Rails</em> as server-side technology as well as <em>JavaScript</em> and related frameworks like <em>AngularJS</em> on the client-side. Zweitag applies behaviour driven development using <em>Rspec</em>, <em>Capybara</em> and <em>Jasmine</em>. Data visualization were done with <em>D3.js</em> among others.</p>
      <h4>Responsibilities &amp; Achievements</h4>
