  - id: ims-research-assistant
    period: 8/2010 - 10/2011
    company: Institute of Mathematical Statistics
    company_details: of the University of Münster
    title: Research assistant
    description: |
      <p>As a research assistant at the institute for probability theory at the University of Münster I was mentor for seminars in probability theory and statistical modelling. Besides I lead the internship for applied statistics with R. I did research in the field of renewal theory exploring structural inheritance properties of Markov renewal processes. Meanwhile I worked as a software developer at Zweitag GmbH (see above).</p>
    variants: [full]

  - id: fairix
    period: 10/2008 - 3/2010
    company: Fairix
    company_details: Startup
    title: Software developer, CTO
    description: |
      <p>Fairix is a startup I took part in as a software engineer while I was a student of mathematics. Fairix provided a platform to producers and merchants enabling them to offer products with additional ecological or social value, e.g. fair trade products. In an engineering team of two we developed a marketplace platform with Ruby on Rails. For that purpose I learnt Rails from scratch and I was leading the development in the later course of the project when the platform launched. The startup finally ran out of funds after two years.</p>
    variants: [full]

  - id: bsi
    period: 8/2007 - 9/2007
    company: "Bundesamt für Sicherheit in der Informationstechnik"
    company_details: (BSI)
    title: Research engineer (Pattern recognition)
    description: |
      <p>At my internship at the BSI I worked on research topics about malware classification. The internship lasted two months and together with my mentor I implemented a pattern recognition and a clustering approach to identify and distinguish malware by the kinds of exploits it used. The software had to be extremely performant and of linear complexity and was written in C.</p>
    variants: [full]

