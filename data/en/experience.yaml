experience:
  - id: freelance
    period: 8/2019 - present
    company: Freelance
    company_details: Self-employed
    title: Data Scientist
    description: |
      <h4>Projects</h4>
      <p>As a freelance <em>data scientist</em>, I have delivered completed client projects covering both applied <em>machine learning / deep learning</em> and robust <em>data engineering</em>: data modelling, warehouse architecture and reliable data flows. The work has ranged from focused research spikes and feasibility studies to <em>production software</em>, including <em>ML microservices</em>, Docker-based integration into production systems, <em>cloud-based data pipelines</em> and systems using managed compute and storage on <em>AWS</em> and <em>GCloud</em>. Depending on the project, I worked as part of existing teams, <em>led small project teams</em> or carried solutions from concept to implementation independently. The common thread has been turning uncertain ML and data problems into working systems, validated analyses or decision-ready prototypes with practical value for customers.</p>
      <p>Projects I have worked on include:</p>
      <ul>
        <li>Swipe-based <em>recommendation app</em> using content-based image retrieval and a bandit algorithm</li>
        <li>Conducting workshops and teaching concepts of <em>deep learning</em> for <em>computer vision</em></li>
        <li>Text-based categorization of marketing texts</li>
        <li>Hybrid image <em>semantic segmentation</em> and <em>pose detection</em> in street scenes</li>
        <li>Implementation of a literature management system with <em>ELK-stack integration</em></li>
        <li><em>NLP</em>- and recommendation-based matchmaking</li>
        <li>Evaluation of <em>deep learning models</em> for autonomous driving</li>
        <li><em>Time series forecasts</em> for demand prediction in logistics</li>
        <li>Design and implementation of <em>recommendation microservices</em> for production news sites</li>
        <li><em>Data pipelines</em> and <em>data warehouse</em> design &amp; implementation on <em>AWS</em> and <em>GCloud</em> with <em>dbt</em> and <em>Airflow</em></li>
        <li><em>Text extraction</em> and entity matching from historical museum labels for species categorization</li>
        <li>Gesture recognition in videos with <em>video transformer models</em></li>
      </ul>
    brief_summary: Freelance data scientist delivering completed ML and data engineering projects, from research spikes to cloud-based production software.
    brief_points:
      - Solved customer problems in computer vision, NLP, recommender systems, forecasting and video understanding
      - Built production ML microservices, data pipelines and data warehouses on AWS and GCloud
      - Worked in teams, led small teams and delivered selected projects independently from concept to implementation
    variants: [full, brief]

  - id: mediaire
    period: 2/2020 - 10/2021
    company: mediaire GmbH
    company_details: AI-software for radiologists
    title: Senior Data Scientist
    description: |
      <p>At mediaire I was responsible for <em>benchmarking</em> and adapting <em>segmentation and classification models</em> for <em>MRI images</em> as well as for integrating them into the software.</p>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li>Developing prototypes for segmenting and classifying MRI-images</li>
        <li>Evaluating and benchmarking state-of-the-art solutions for <em>medical image analysis</em></li>
        <li>Development and improvement of <em>Deep Learning models</em></li>
      </ul>
    brief_summary: Benchmarked, adapted and integrated deep learning models for MRI segmentation and classification.
    brief_points:
      - Prototyped medical image analysis models and evaluated state-of-the-art approaches
    variants: [full, brief]

  - id: twenty-billion-neurons
    period: 6/2017 - 8/2019
    company: Twenty Billion Neurons GmbH
    company_details: Realtime video understanding
    title: A.I. Engineer / Senior A.I. Engineer
    description: |
      <p>At Twenty Billion Neurons I worked as a <em>research and development engineer</em>, creating <em>artificial neural networks</em> which detect activities in videos. I participated in developing solutions for <em>spatial and temporal activity detection</em> using deep neural networks and applied the technology in a series of <em>customer projects</em>.</p>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li>Developing solutions for <em>spatial detection</em> performed in real-time on videos</li>
        <li>Developing solutions for accurate <em>temporal predictions</em> and prediction of trigger points in videos</li>
        <li>Realization of customer projects</li>
        <li>Mentoring tasks</li>
      </ul>
    brief_summary: Developed neural network systems for real-time spatial and temporal activity detection in video.
    brief_points:
      - Applied video understanding technology in customer projects and supported mentoring
    variants: [full, brief]

  - id: unbelievable-machine
    period: 11/2014 - 6/2017
    company: The unbelievable Machine Company GmbH
    company_details: Cloud Service Provider and Full Service Provider for Data Solutions
    title: Data Scientist
    description: |
      <p>At the unbelievable Machine Company I worked on a variety of <em>Data Science projects</em>. These include industry projects as well as e-commerce and media-related projects. Among others I worked on</p>
      <ul>
        <li><em>Computer Vision</em>: image recognition using neural networks</li>
        <li><em>Recommendation</em>: collaborative filtering, content-based recommendations, statistical and bandit approaches</li>
        <li><em>Predictive maintenance</em>: predicting malfunction of manufacturing components and classifying errors</li>
        <li><em>Performance prediction</em>: predicting distribution of user participation among different channels</li>
        <li>Prediction of energy consumption</li>
        <li>Various clustering / segmentation tasks</li>
      </ul>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li><em>Leading role</em> in most projects</li>
        <li><em>Customer communication</em></li>
        <li>Contributing to the improvement of internal processes</li>
        <li>Introducing <em>best practices for coding</em></li>
        <li>Speaker at several conferences including the bitkom Big Data Summit</li>
      </ul>
    brief_summary: Led applied data science projects across computer vision, recommendations, predictive maintenance and forecasting.
    brief_points:
      - Owned customer communication, technical concepts and internal coding best practices
    variants: [full, brief]

  - id: bitcrowd
