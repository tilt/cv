experience:
  - id: freelance
    period: 8/2019 - present
    company: Freelance
    company_details: Self-employed
    title: Data Scientist
    description: |
      <h4>Projects</h4>
      <p>As a freelancer, I have tackled algorithmic challenges across various domains, including computer vision, natural language processing, and demand forecasting. In addition to these, I have also engaged in data engineering tasks, focusing on the implementation of data pipelines and the expansion of data warehouses. My role has encompassed the development of concepts, research and development, hands-on implementation, and project coordination tasks.</p>
      <p>Projects I have worked on include:</p>
      <ul>
        <li>Swipe-based recommendation app using content-based image retrieval and a bandit algorithm</li>
        <li>Conducting workshops and teaching concepts of deep learning for computer vision</li>
        <li>Text-based categorization of marketing texts</li>
        <li>Hybrid image semantic segmentation and pose detection in street scenes</li>
        <li>Implementation of a literature management system with ELK-stack integration</li>
        <li>NLP- and recommendation-based matchmaking</li>
        <li>Evaluation of deep learning models for autonomous driving</li>
        <li>Time series forecasts for demand prediction in logistics</li>
        <li>Design and implementation of recommendation microservices for production news sites</li>
        <li>Data pipelines and data warehouse design &amp; implementation on AWS and GCloud with dbt and Airflow</li>
      </ul>
    variants: [full, brief]

  - id: mediaire
    period: 2/2020 - 10/2021
    company: mediaire GmbH
    company_details: AI-software for radiologists
    title: Senior Data Scientist
    description: |
      <p>At mediaire I was responsible for benchmarking and adapting segmentation and classification models for MRI images as well as for integrating them into the software.</p>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li>Developing prototypes for segmenting and classifying MRI-images</li>
        <li>Evaluating and benchmarking state-of-the-art solutions for medical image analysis</li>
        <li>Development and improvement of Deep Learning-models</li>
      </ul>
    variants: [full]

  - id: twenty-billion-neurons
    period: 6/2017 - 8/2019
    company: Twenty Billion Neurons GmbH
    company_details: Realtime video understanding
    title: A.I. Engineer / Senior A.I. Engineer
    description: |
      <p>At Twenty Billion Neurons I worked as a research and development engineer, creating artificial neural networks which detect activities in videos. I participated in developing solutions for spatial and temporal activity detection using deep neural networks and applied the technology in a series of customer projects.</p>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li>Developing solutions for spatial detection performed in real-time on videos</li>
        <li>Developing solutions for accurate temporal predictions and prediction of trigger points in videos</li>
        <li>Realization of customer projects</li>
        <li>Mentoring tasks</li>
      </ul>
    variants: [full]

  - id: unbelievable-machine
    period: 11/2014 - 6/2017
    company: The unbelievable Machine Company GmbH
    company_details: Cloud Service Provider and Full Service Provider for Data Solutions
    title: Data Scientist
    description: |
      <p>At the unbelievable Machine Company I worked on a variety of Data Science projects. These include industry projects as well as e-commerce and media-related projects. Among others I worked on</p>
      <ul>
        <li>Computer Vision: Image recognition using neural networks</li>
        <li>Recommendation: Collaborative filtering, content-based recommendations, statistical and bandit approaches</li>
        <li>Predictive maintenance: Predicting malfunction of manufacturing components and classifying errors</li>
        <li>Performance prediction: Predicting distribution of user participation among different channels</li>
        <li>Prediction of energy consumption</li>
        <li>Various clustering / segmentation tasks</li>
      </ul>
      <h4>Responsibilities &amp; Achievements</h4>
      <ul>
        <li>Leading role in most projects</li>
        <li>Customer communication</li>
        <li>Contributing to the improvement of internal processes</li>
        <li>Introducing best practices for coding</li>
        <li>Speaker at several conferences including the bitkom Big Data Summit</li>
      </ul>
