      <p>Als Softwareingenieur arbeitete ich an verschiedenen Projekten, zum Beispiel <em>so-schmeckts.de</em> oder <em>compeon.de</em>. Die eingesetzten Technologien umfassten <em>Rails</em> als serverseitige Technologie sowie <em>JavaScript</em> und verwandte Frameworks wie <em>AngularJS</em> auf der Clientseite. Zweitag praktiziert verhaltensgetriebene Entwicklung mit <em>Rspec</em>, <em>Capybara</em> und <em>Jasmine</em>. Datenvisualisierungen wurden unter anderem mit <em>D3.js</em> erstellt.</p>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li>Backend- und clientseitige Entwicklung</li>
        <li>Technische Konzepte</li>
        <li>Kundenkommunikation</li>
        <li>Projektkoordination</li>
