experience:
  - id: freelance
    period: 8/2019 - heute
    company: Freiberuflich
    company_details: Selbstständig
    title: Data Scientist
    description: |
      <h4>Projekte</h4>
      <p>Als freiberuflicher <em>Data Scientist</em> habe ich abgeschlossene Kundenprojekte umgesetzt, die sowohl angewandtes <em>Machine Learning / Deep Learning</em> als auch belastbares <em>Data Engineering</em> abdeckten: Datenmodellierung, Data-Warehouse-Architektur und zuverlässige Datenflüsse. Die Arbeit reichte von fokussierten Research Spikes und Machbarkeitsstudien bis zu <em>produktiver Software</em>, darunter <em>ML-Microservices</em>, Docker-basierte Integration in Produktionssysteme, <em>cloudbasierte Datenpipelines</em> und Systeme mit Managed Compute und Storage auf <em>AWS</em> und <em>GCloud</em>. Je nach Projekt arbeitete ich in bestehenden Teams, <em>leitete kleine Projektteams</em> oder führte Lösungen eigenständig von der Konzeption bis zur Implementierung. Der gemeinsame Kern war, unsichere ML- und Datenprobleme in funktionierende Systeme, belastbare Analysen oder entscheidungsreife Prototypen mit praktischem Nutzen für Kunden zu überführen.</p>
      <p>Projekte, an denen ich gearbeitet habe:</p>
      <ul>
        <li>Swipe-basierte <em>Empfehlungs-App</em> mit inhaltsbasiertem Image Retrieval und einem Bandit-Algorithmus</li>
        <li>Durchführung von Workshops und Vermittlung von <em>Deep-Learning-Konzepten</em> für <em>Computer Vision</em></li>
        <li>Textbasierte Kategorisierung von Marketingtexten</li>
        <li>Hybride <em>semantische Bildsegmentierung</em> und <em>Poseerkennung</em> in Straßenszenen</li>
        <li>Implementierung eines Literaturverwaltungssystems mit <em>ELK-Stack-Integration</em></li>
        <li><em>NLP</em>- und empfehlungsbasiertes Matchmaking</li>
        <li>Evaluation von <em>Deep-Learning-Modellen</em> für autonomes Fahren</li>
        <li><em>Zeitreihenprognosen</em> für Bedarfsvorhersagen in der Logistik</li>
        <li>Design und Implementierung von <em>Empfehlungs-Microservices</em> für Nachrichtenportale</li>
        <li><em>Datenpipelines</em> und <em>Data-Warehouse</em>-Design &amp; -Implementierung auf <em>AWS</em> und <em>GCloud</em> mit <em>dbt</em> und <em>Airflow</em></li>
        <li><em>Text-Extraktion</em> und Entitätszuordnung für historische Museum Labels zur Artenkategorisierung</li>
        <li><em>Gestenerkennung</em> in Videos mit Video-Transformer-Modellen</li>
      </ul>
    brief_summary: Freiberuflicher Data Scientist für abgeschlossene ML- und Data-Engineering-Projekte, von Research Spikes bis zu cloudbasierter Produktionssoftware.
    brief_points:
      - Kundenprobleme in Computer Vision, NLP, Empfehlungssystemen, Forecasting und Videoanalyse gelöst
      - Produktive ML-Microservices, Datenpipelines und Data Warehouses auf AWS und GCloud umgesetzt
      - In Teams gearbeitet, kleine Teams geleitet und ausgewählte Projekte eigenständig von Konzept bis Implementierung geliefert
    variants: [full, brief]

  - id: mediaire
