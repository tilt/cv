    title: A.I. Engineer / Senior A.I. Engineer
    description: |
      <p>Bei Twenty Billion Neurons arbeitete ich als Forschungs- und Entwicklungsingenieur an künstlichen neuronalen Netzen zur Aktivitätserkennung in Videos. Ich war an der Entwicklung von Lösungen zur räumlichen und zeitlichen Aktivitätserkennung mit tiefen neuronalen Netzen beteiligt und setzte die Technologie in verschiedenen Kundenprojekten ein.</p>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li>Entwicklung von Lösungen zur räumlichen Erkennung in Echtzeit-Videos</li>
        <li>Entwicklung von Lösungen für präzise zeitliche Vorhersagen und Triggerpunkt-Erkennung in Videos</li>
        <li>Umsetzung von Kundenprojekten</li>
        <li>Mentoring-Aufgaben</li>
      </ul>
