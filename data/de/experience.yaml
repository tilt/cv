experience:
  - id: freelance
    period: 8/2019 - heute
    company: Freiberuflich
    company_details: Selbstständig
    title: Data Scientist
    description: |
      <h4>Projekte</h4>
      <p>Als Freiberufler habe ich algorithmische Herausforderungen in verschiedenen Bereichen bearbeitet, darunter Computer Vision, natürliche Sprachverarbeitung und Bedarfsprognosen. Darüber hinaus habe ich Data-Engineering-Aufgaben übernommen, mit Schwerpunkt auf der Implementierung von Datenpipelines und dem Ausbau von Data Warehouses. Meine Rolle umfasste Konzeptentwicklung, Forschung und Entwicklung, praktische Umsetzung und Projektkoordination.</p>
      <p>Projekte, an denen ich gearbeitet habe:</p>
      <ul>
        <li>Swipe-basierte Empfehlungs-App mit inhaltsbasiertem Image Retrieval und einem Bandit-Algorithmus</li>
        <li>Durchführung von Workshops und Vermittlung von Deep-Learning-Konzepten für Computer Vision</li>
        <li>Textbasierte Kategorisierung von Marketingtexten</li>
        <li>Hybride semantische Bildsegmentierung und Poseerkennung in Straßenszenen</li>
        <li>Implementierung eines Literaturverwaltungssystems mit ELK-Stack-Integration</li>
        <li>NLP- und empfehlungsbasiertes Matchmaking</li>
        <li>Evaluation von Deep-Learning-Modellen für autonomes Fahren</li>
        <li>Zeitreihenprognosen für Bedarfsvorhersagen in der Logistik</li>
        <li>Design und Implementierung von Empfehlungs-Microservices für Nachrichtenportale</li>
        <li>Datenpipelines und Data-Warehouse-Design &amp; -Implementierung auf AWS und GCloud mit dbt und Airflow</li>
        <li>Text-Extraktion und Entitätszuordnung für historische Museum Labels zur Artenkategorisierung</li>
        <li>Gestenerkennung in Videos mit Video-Transformer-Modellen</li>
      </ul>
    variants: [full, brief]

  - id: mediaire
    period: 2/2020 - 10/2021
    company: mediaire GmbH
    company_details: KI-Software für Radiologen
    title: Senior Data Scientist
    description: |
      <p>Bei mediaire war ich verantwortlich für das Benchmarking und die Anpassung von Segmentierungs- und Klassifikationsmodellen für MRT-Bilder sowie deren Integration in die Software.</p>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li>Entwicklung von Prototypen zur Segmentierung und Klassifikation von MRT-Bildern</li>
        <li>Evaluation und Benchmarking von State-of-the-Art-Lösungen für medizinische Bildanalyse</li>
        <li>Entwicklung und Verbesserung von Deep-Learning-Modellen</li>
      </ul>
    variants: [full]

  - id: twenty-billion-neurons
