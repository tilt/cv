    company: mediaire GmbH
    company_details: KI-Software für Radiologen
    title: Senior Data Scientist
    description: |
      <p>Bei mediaire war ich verantwortlich für das <em>Benchmarking</em> und die Anpassung von <em>Segmentierungs- und Klassifikationsmodellen</em> für <em>MRT-Bilder</em> sowie deren Integration in die Software.</p>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li>Entwicklung von Prototypen zur Segmentierung und Klassifikation von MRT-Bildern</li>
        <li>Evaluation und Benchmarking von State-of-the-Art-Lösungen für <em>medizinische Bildanalyse</em></li>
        <li>Entwicklung und Verbesserung von <em>Deep-Learning-Modellen</em></li>
      </ul>
    brief_summary: Benchmarking, Anpassung und Integration von Deep-Learning-Modellen für MRT-Segmentierung und -Klassifikation.
    brief_points:
      - Prototypen für medizinische Bildanalyse entwickelt und State-of-the-Art-Ansätze evaluiert
    variants: [full, brief]

  - id: twenty-billion-neurons
    period: 6/2017 - 8/2019
    company: Twenty Billion Neurons GmbH
    company_details: Echtzeit-Videoanalyse
    title: A.I. Engineer / Senior A.I. Engineer
    description: |
      <p>Bei Twenty Billion Neurons arbeitete ich als <em>Forschungs- und Entwicklungsingenieur</em> an <em>künstlichen neuronalen Netzen</em> zur Aktivitätserkennung in Videos. Ich war an der Entwicklung von Lösungen zur <em>räumlichen und zeitlichen Aktivitätserkennung</em> mit tiefen neuronalen Netzen beteiligt und setzte die Technologie in verschiedenen <em>Kundenprojekten</em> ein.</p>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li>Entwicklung von Lösungen zur <em>räumlichen Erkennung</em> in Echtzeit-Videos</li>
        <li>Entwicklung von Lösungen für präzise <em>zeitliche Vorhersagen</em> und Triggerpunkt-Erkennung in Videos</li>
        <li>Umsetzung von Kundenprojekten</li>
        <li>Mentoring-Aufgaben</li>
      </ul>
    brief_summary: Entwicklung neuronaler Netze für räumliche und zeitliche Aktivitätserkennung in Echtzeit-Videos.
    brief_points:
      - Videoanalyse-Technologie in Kundenprojekten angewendet und Mentoring übernommen
    variants: [full, brief]

  - id: unbelievable-machine
    period: 11/2014 - 6/2017
    company: The unbelievable Machine Company GmbH
    company_details: Cloud-Service-Provider und Full-Service-Provider für Datenlösungen
    title: Data Scientist
    description: |
      <p>Bei der unbelievable Machine Company arbeitete ich an verschiedenen <em>Data-Science-Projekten</em>. Dazu gehörten Industrie-, E-Commerce- und Medienprojekte. Unter anderem arbeitete ich an</p>
      <ul>
        <li><em>Computer Vision</em>: Bilderkennung mit neuronalen Netzen</li>
        <li><em>Empfehlungssysteme</em>: Kollaboratives Filtern, inhaltsbasierte Empfehlungen, statistische und Bandit-Ansätze</li>
        <li><em>Predictive Maintenance</em>: Vorhersage von Fehlfunktionen bei Fertigungskomponenten und Fehlerklassifikation</li>
        <li><em>Performance-Vorhersage</em>: Prognose der Verteilung von Nutzerinteraktionen über verschiedene Kanäle</li>
        <li>Vorhersage des Energieverbrauchs</li>
        <li>Verschiedene Clustering- / Segmentierungsaufgaben</li>
      </ul>
      <h4>Aufgaben &amp; Erfolge</h4>
      <ul>
        <li><em>Führende Rolle</em> in den meisten Projekten</li>
        <li><em>Kundenkommunikation</em></li>
        <li>Beitrag zur Verbesserung interner Prozesse</li>
        <li>Einführung von <em>Best Practices für Programmierung</em></li>
        <li>Referent auf mehreren Konferenzen, darunter der bitkom Big Data Summit</li>
      </ul>
    brief_summary: Leitung angewandter Data-Science-Projekte in Computer Vision, Empfehlungssystemen, Predictive Maintenance und Forecasting.
    brief_points:
      - Kundenkommunikation, technische Konzepte und interne Best Practices für Programmierung verantwortet
