      <p>Als <em>wissenschaftlicher Mitarbeiter</em> am Institut für Wahrscheinlichkeitstheorie der Universität Münster betreute ich Seminare in <em>Wahrscheinlichkeitstheorie</em> und <em>statistischer Modellierung</em>. Außerdem leitete ich das Praktikum für <em>angewandte Statistik mit R</em>. Ich forschte im Bereich der Erneuerungstheorie und untersuchte strukturelle Vererbungseigenschaften von Markov-Erneuerungsprozessen. Parallel arbeitete ich als <em>Softwareentwickler</em> bei Zweitag GmbH (siehe oben).</p>
