    company_details: Startup
    title: Softwareentwickler, CTO
    description: |
      <p>Fairix ist ein Startup, an dem ich als Softwareingenieur während meines Mathematikstudiums mitwirkte. Fairix bot Produzenten und Händlern eine Plattform, um Produkte mit zusätzlichem ökologischem oder sozialem Wert anzubieten, z.B. Fair-Trade-Produkte. In einem Entwicklerteam zu zweit entwickelten wir eine Marktplatz-Plattform mit Ruby on Rails. Dafür lernte ich Rails von Grund auf und übernahm im weiteren Projektverlauf die Leitung der Entwicklung bis zum Launch. Das Startup ging nach zwei Jahren die Finanzierung aus.</p>
