  - id: ims-research-assistant
    period: 8/2010 - 10/2011
    company: Institut für Mathematische Statistik
    company_details: der Universität Münster
    title: Wissenschaftlicher Mitarbeiter
    description: |
      <p>Als wissenschaftlicher Mitarbeiter am Institut für Wahrscheinlichkeitstheorie der Universität Münster betreute ich Seminare in Wahrscheinlichkeitstheorie und statistischer Modellierung. Außerdem leitete ich das Praktikum für angewandte Statistik mit R. Ich forschte im Bereich der Erneuerungstheorie und untersuchte strukturelle Vererbungseigenschaften von Markov-Erneuerungsprozessen. Parallel arbeitete ich als Softwareentwickler bei Zweitag GmbH (siehe oben).</p>
    variants: [full]

  - id: fairix
    period: 10/2008 - 3/2010
